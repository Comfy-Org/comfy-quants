project:
  name: flux2-nvfp4-v0
  created_by: comfy_quants
  seed: 42
model:
  family: flux2
  model_id: black-forest-labs/FLUX.2-dev
  revision: "<pin-this>"
  dtype: bf16
  source: huggingface
  trust_remote_code: false
  components:
    transformer: quantize
    text_encoder: keep_bf16
    vae: keep_bf16
quant:
  algorithm: nvfp4
  target_dtype: nvfp4
  scale:
    granularity: block
    axis: in_features
    method: amax
  rounding: nearest_even
  modules:
    include:
      - "double_blocks.*"
      - "single_blocks.*"
