project:
  name: flux2-nvfp4-mixed-v0
  created_by: comfy_quants
  seed: 42
# Mixed-precision recipe (nvfp4 base): keep double-stream attention in bf16; quantize
# MLP + fused single-stream linears. Note: relative to the full nvfp4 config the bf16
# attention adds substantially more than the ~6% seen in fp8mixed, since the base weights
# here are 4-bit (bf16 attention is ~4x those weights vs nvfp4).
model:
  family: flux2
  model_id: black-forest-labs/FLUX.2-dev
  revision: "<pin-this>"
  dtype: bf16
  source: huggingface
  trust_remote_code: false
  components:
    transformer: quantize
    text_encoder: keep_bf16
    vae: keep_bf16
quant:
  algorithm: nvfp4
  target_dtype: nvfp4
  scale:
    granularity: block
    axis: in_features
    method: amax
  rounding: nearest_even
  modules:
    include:
      - "double_blocks.*"
      - "single_blocks.*"
    exclude:
      - "*_attn.qkv"
      - "*_attn.proj"
  fallback:
    on_error: keep_bf16
artifact:
  format: safetensors_quant
  compatibility_target: L2
  write_module_reports: true
